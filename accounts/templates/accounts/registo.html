<!DOCTYPE html>
<html>

<head>
    <title>Portfolio - Registo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .auth-container {
            max-width: 400px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }

        .btn {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #218838;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h2>Criar Nova Conta</h2>
    <div class="auth-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button type="submit" class="btn">Registar</button>
        </form>
        <p>Já tens uma conta? <a href="{% url 'accounts:login' %}">Entra aqui</a></p>
        <hr>
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar ao Menu</a>
    </div>
</body>

</html>
