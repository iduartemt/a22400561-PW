{% load socialaccount %}
<!DOCTYPE html>
<html>

<head>
    <title>Portfolio - Registo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .auth-container {
            max-width: 400px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }

        .btn {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #218838;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h2>Criar Nova Conta</h2>
    <div class="auth-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button type="submit" class="btn">Registar</button>
        </form>

        <a href="{% provider_login_url 'google' %}" class="btn"
            style="background-color: #db4437; text-align: center; width: 95%; box-sizing: border-box; margin-top: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
            <svg style="width: 16px; height: 16px; fill: white;" viewBox="0 0 24 24"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.53-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.746-.08-1.32-.176-1.886H12.24z"/></svg>
            Registar com Google
        </a>

        <p>Já tens uma conta? <a href="{% url 'accounts:login' %}">Entra aqui</a></p>
        <hr>
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar ao Menu</a>
    </div>
</body>

</html>
