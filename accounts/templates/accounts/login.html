<!DOCTYPE html>
<html>

<head>
    <title>Portfolio - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .auth-container {
            max-width: 400px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h2>Entrar no Sistema</h2>
    <div class="auth-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button type="submit" class="btn">Login</button>
        </form>
        <hr style="border-top: 1px dashed #ccc; margin: 15px 0;">
        <a href="{% url 'accounts:pedir_link' %}" class="btn"
            style="background-color: #17a3b8; text-align: center; width: 95%; box-sizing: border-box;">🪄 Entrar com
            Link Mágico (Sem Password)</a>
        <p>Ainda não tens conta? <a href="{% url 'accounts:registo' %}">Regista-te aqui</a></p>
        <hr>
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar ao Menu</a>
    </div>
</body>

</html>
