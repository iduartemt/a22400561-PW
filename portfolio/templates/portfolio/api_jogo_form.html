<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo_pagina }}</title>
</head>
<body>
    <h1>{{ titulo_pagina }}</h1>
    <p><a href="{% url 'api_externa' %}">Voltar a lista</a></p>

    {% if erro %}
        <p style="color: red;">{{ erro }}</p>
    {% endif %}

    {% if jogo %}
        <form method="post">
            {% csrf_token %}
            <p><label>Titulo</label><input type="text" name="titulo" value="{{ jogo.titulo }}" required></p>
            <p><label>Ano</label><input type="number" name="ano_lancamento" value="{{ jogo.ano_lancamento }}" required></p>
            <p><label>Genero</label><input type="text" name="genero" value="{{ jogo.genero }}"></p>
            <p><label>Descricao</label><textarea name="descricao">{{ jogo.descricao }}</textarea></p>
            <p><label>Numero de jogadores</label><input type="number" name="numero_jogadores" value="{{ jogo.numero_jogadores|default:1 }}"></p>
            <p><label>Multiplayer</label><input type="checkbox" name="multiplayer" {% if jogo.multiplayer %}checked{% endif %}></p>
            <p><label>Classificacao</label><input type="text" name="classificacao" value="{{ jogo.classificacao }}"></p>
            <p><label>Nota</label><input type="number" step="0.1" name="nota" value="{{ jogo.nota|default:0 }}"></p>
            <p><label>IDs das consolas</label><input type="text" name="consolas_ids" value="{{ jogo.consolas_ids|join:',' }}" required></p>
            <p><label>ID da desenvolvedora</label><input type="number" name="desenvolvedora_id" value="{{ jogo.desenvolvedora_id }}" required></p>
            <button type="submit">Guardar</button>
        </form>
    {% endif %}
</body>
</html>
