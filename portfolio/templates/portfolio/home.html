<!DOCTYPE html>
<html>

<head>
    <title>Portfolio Acadêmico - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin-top: 20px;
        }

        .menu-btn {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
        }

        .menu-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h1>Menu Principal - Portfolio</h1>

    {% if licenciatura %}
    <h2>Licenciatura em {{ licenciatura.nome }}</h2>

    <!-- O nosso Menu de Navegação -->
    <div class="menu-container">
        <!-- Link para os detalhes do curso (que já tinhas) -->
        <a class="menu-btn" href="{% url 'curso_detail' %}">Sobre o Curso</a>

        <!-- Link para a nova página de UCs que acabaste de criar -->
        <a class="menu-btn" href="{% url 'ucs' %}">Unidades Curriculares</a>

        <!-- No futuro, adicionarás mais botões aqui, por exemplo: -->
        {# <a class="menu-btn" href="{% url 'tecnologias' %}">Tecnologias</a> #}
        {# <a class="menu-btn" href="{% url 'projetos' %}">Projetos</a> #}

    </div>

    {% else %}
    <p>Nenhum curso encontrado na Base de Dados.</p>
    {% endif %}
</body>

</html>
