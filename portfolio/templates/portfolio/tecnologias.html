<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Tecnologias</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .tech-card { background-color: #f9f9f9; padding: 15px; margin-bottom: 20px; border-radius: 8px; border-left: 4px solid #17a2b8; }
        .tech-tipo { font-size: 0.9em; color: #666; font-style: italic; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
        .back-btn { text-decoration: none; color: #555; }
        .back-btn:hover { text-decoration: underline; color: #000; }
    </style>
</head>
<body>
    <h1>Tecnologias e Ferramentas</h1>

    <p><a class="back-btn" href="{% url 'home' %}">⬅ Voltar ao Menu Principal</a></p>

    {% for tech in tecnologias %}
        <div class="tech-card">
            <h3>{{ tech.nome }} <span class="tech-tipo">({{ tech.tipo }})</span></h3>
            <p>{{ tech.descricao }}</p>
            {% if tech.website_oficial %}
                <p><a href="{{ tech.website_oficial }}" target="_blank">Visitar Website Oficial</a></p>
            {% endif %}
        </div>
    {% empty %}
        <p>Ainda não tens tecnologias registadas.</p>
    {% endfor %}

</body>
</html>
